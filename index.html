<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dot Motion Tool</title>
<link rel="stylesheet" href="style.css">
</head>

<body>
<main class="app">
  <section class="preview" aria-label="Dot animation preview">
    <div id="grid" class="grid"></div>
  </section>

  <aside class="controls">
    <h1>Dot Motion</h1>

    <button id="playPause" type="button">Pause</button>

    <label>
      Speed <span id="speedVal">5</span>
      <input type="range" id="speed" min="1" max="20" value="5">
    </label>

    <h2>Noise</h2>

    <label>
      Pattern
      <select id="noiseType">
        <option value="perlin">Perlin</option>
        <option value="fbm">Fractal Brownian Motion</option>
        <option value="turbulence">Turbulence</option>
        <option value="ridged">Ridged</option>
        <option value="cellular">Cellular</option>
      </select>
    </label>

    <label>
      Noise scale <span id="noiseScaleVal">100%</span>
      <input type="range" id="noiseScale" min="25" max="300" value="100">
    </label>

    <label>
      Min opacity <span id="minOpacityVal">12%</span>
      <input type="range" id="minOpacity" min="0" max="100" value="12">
    </label>

    <label>
      Max opacity <span id="maxOpacityVal">100%</span>
      <input type="range" id="maxOpacity" min="0" max="100" value="100">
    </label>

    <label>
      Opacity contrast <span id="opacityContrastVal">100%</span>
      <input type="range" id="opacityContrast" min="0" max="300" value="100">
    </label>

    <h2>Grid</h2>

    <label>
      Cols <span id="colsVal">20</span>
      <input type="range" id="cols" min="15" max="20" value="20">
    </label>

    <label>
      Rows <span id="rowsVal">2</span>
      <input type="range" id="rows" min="1" max="8" value="2">
    </label>

    <label>
      Scale <span id="scaleVal">100%</span>
      <input type="range" id="scale" min="25" max="200" value="100">
    </label>

    <h2>Dots</h2>

    <label>
      Size <span id="dotSizeVal">10</span>
      <input type="range" id="dotSize" min="4" max="30" value="10">
    </label>

    <label class="inline-control">
      <input type="checkbox" id="randomSize">
      Random size
    </label>

    <label>
      Dot color
      <input type="color" id="dotColor" value="#ffffff">
    </label>

    <label>
      Background color
      <input type="color" id="bgColor" value="#101010">
    </label>

    <h2>Download</h2>

    <button id="exportCSS" type="button">Export CSS</button>
    <button id="exportReact" type="button">Export React</button>
    <button id="exportSVG" type="button">Export SVG</button>
    <button id="exportGIF" type="button">Export GIF</button>
  </aside>
</main>

<script src="script.js"></script>
</body>
</html>
